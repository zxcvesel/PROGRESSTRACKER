name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Run tests
        run: go test -cover ./...
      - name: Run vet
        run: go vet ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Scan Go dependencies
        run: govulncheck ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm run test:e2e

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate local Compose configuration
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate staging Compose configuration
        run: docker compose --env-file .env.staging.example -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml config --quiet
      - name: Build application images
        run: docker compose -f docker-compose.yml build
      - name: Smoke test local containers
        run: |
          docker compose -f docker-compose.yml up -d --wait
          curl --fail --silent --show-error http://127.0.0.1:8088/nginx-health
          curl --fail --silent --show-error http://127.0.0.1:8088/api/ready
      - name: Stop local containers
        if: always()
        run: docker compose -f docker-compose.yml down --volumes
