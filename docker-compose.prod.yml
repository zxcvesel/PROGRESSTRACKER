services:
  backend:
    environment:
      PROGRESS_TRACKER_ENV: production
      PROGRESS_TRACKER_ALLOWED_ORIGINS: ${PROGRESS_TRACKER_ALLOWED_ORIGINS:?required}
      PROGRESS_TRACKER_PUBLIC_URL: ${PROGRESS_TRACKER_PUBLIC_URL:?required}
      PROGRESS_TRACKER_SECURE_COOKIES: "true"
      PROGRESS_TRACKER_DEV_ACTION_TOKENS: "false"
      PROGRESS_TRACKER_SMTP_HOST: ${PROGRESS_TRACKER_SMTP_HOST:?required}
      PROGRESS_TRACKER_SMTP_PORT: ${PROGRESS_TRACKER_SMTP_PORT:-587}
      PROGRESS_TRACKER_SMTP_USERNAME: ${PROGRESS_TRACKER_SMTP_USERNAME:-}
      PROGRESS_TRACKER_SMTP_PASSWORD: ${PROGRESS_TRACKER_SMTP_PASSWORD:-}
      PROGRESS_TRACKER_SMTP_FROM: ${PROGRESS_TRACKER_SMTP_FROM:?required}

  frontend:
    ports: !override
      - "127.0.0.1:8088:80"
