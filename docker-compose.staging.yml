services:
  frontend:
    ports: !reset []

  gateway:
    image: nginx:1.29-alpine
    init: true
    ports:
      - "${STAGING_HTTP_PORT:-80}:80"
      - "${STAGING_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./deploy/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      frontend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"
